name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check
      - run: |
          generated_status="$(git status --porcelain --untracked-files=all -- dist bun.lock)"
          if [[ -n "$generated_status" ]]; then
            printf '%s\n' "$generated_status"
            exit 1
          fi
      - run: bun pm pack --dry-run --ignore-scripts
      - run: node --input-type=module -e 'await Promise.all(["./dist/index.js"].map((path) => import(path)))'
